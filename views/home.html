<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/views/home.css">
    <title>TODOアプリ</title>
</head>
<body>
    <div class="container">
        <h1>TODOアプリ</h1>
        <form action="/task" method="get" class="form-row">
            <input name="task" type="text" placeholder="タスクを入力しよう！！">
            <input type="submit" value="追加">
        </form>
        <table>
            <thead>
                <tr>
                    <th class="id-cell">ID</th>
                    <th>タスク</th>
                </tr>
            </thead>
            <tbody>
                {{ range . }}
                <tr>
                    <td class="id-cell">{{ .ID }}</td>
                    <td>{{ .Task }}</td>
                </tr>
                {{ end }}
            </tbody>
        </table>
    </div>
</body>
</html>
